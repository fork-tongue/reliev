name: Benchmarks

on:
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv and Python 3.14
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync

      - name: Run benchmarks
        env:
          PYTHONHASHSEED: "0"
        run: |
          git fetch origin master

          for i in 1 2 3; do
            git checkout origin/master -- reliev/
            uv run --no-sync pytest benchmarks/benchmark.py \
                --benchmark-only \
                --benchmark-save=master$i \
                --benchmark-sort=mean || true

            git checkout HEAD -- reliev/
            uv run --no-sync pytest benchmarks/benchmark.py \
                --benchmark-only \
                --benchmark-save=branch$i \
                --benchmark-sort=mean
          done

      - name: Compare benchmarks
        run: |
          uv run --no-sync python benchmarks/compare_runs.py \
              --baseline '.benchmarks/*/*_master?.json' \
              --branch '.benchmarks/*/*_branch?.json' \
              --threshold 0.25
